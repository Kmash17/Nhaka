<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Family Heritage - A beautifully crafted interactive family tree visualization tool for preserving and exploring your ancestral legacy">
<meta name="theme-color" content="#0f0e0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Family Heritage • Interactive Family Tree</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  /* Modern CSS Reset & Variables */
  :root {
    --bg-primary: #0a0908;
    --bg-secondary: #11100e;
    --bg-tertiary: #1a1815;
    --bg-card: #1c1a16;
    --bg-card-hover: #24211c;
    --gold-primary: #d4af37;
    --gold-light: #f4d03f;
    --gold-dark: #9a7b1c;
    --gold-soft: rgba(212, 175, 55, 0.15);
    --text-primary: #f5f0e8;
    --text-secondary: #c4b8a7;
    --text-muted: #8a8178;
    --border-subtle: rgba(212, 175, 55, 0.12);
    --border-medium: rgba(212, 175, 55, 0.25);
    --male-color: #4a7c9b;
    --male-light: #6ba3c7;
    --female-color: #9b4a6e;
    --female-light: #c76b93;
    --unknown-color: #6b6b5e;
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
    --shadow-gold: 0 4px 12px rgba(212, 175, 55, 0.15);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --font-serif: 'Cormorant Garamond', serif;
    --font-sans: 'Inter', sans-serif;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Elegant Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--border-medium);
    border-radius: 3px;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold-primary); }

  /* Header - Refined */
  .app-header {
    background: linear-gradient(180deg, var(--bg-secondary) 0%, rgba(17, 16, 14, 0.98) 100%);
    border-bottom: 1px solid var(--border-subtle);
    padding: 0 2rem;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo-wrapper {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--gold-soft), transparent);
    border: 1.5px solid var(--border-medium);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: var(--shadow-gold);
  }

  .logo-text {
    font-family: var(--font-serif);
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--gold-primary);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .logo-subtext {
    font-family: var(--font-sans);
    font-size: 0.7rem;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Modern Button System */
  .btn {
    font-family: var(--font-sans);
    font-size: 0.8rem;
    font-weight: 500;
    border: 1px solid var(--border-subtle);
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    border-radius: var(--radius-md);
    padding: 8px 16px;
    cursor: pointer;
    transition: all var(--transition-fast);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    letter-spacing: 0.01em;
    backdrop-filter: blur(5px);
  }

  .btn i { font-size: 0.9rem; opacity: 0.8; }
  .btn:hover {
    background: var(--bg-card-hover);
    color: var(--text-primary);
    border-color: var(--border-medium);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
    color: var(--bg-primary);
    border: none;
    font-weight: 600;
    box-shadow: var(--shadow-gold);
  }

  .btn-primary:hover {
    background: linear-gradient(135deg, var(--gold-primary), var(--gold-light));
    color: var(--bg-primary);
    box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
  }

  .btn-danger {
    color: #e07070;
    border-color: rgba(224, 112, 112, 0.2);
  }

  .btn-danger:hover {
    background: rgba(224, 112, 112, 0.1);
    color: #f09090;
    border-color: rgba(224, 112, 112, 0.4);
  }

  .btn-icon {
    padding: 8px 12px;
  }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  /* Main Layout */
  .app-container {
    display: flex;
    height: calc(100vh - 72px);
    position: relative;
  }

  /* Enhanced Sidebar */
  .sidebar {
    width: 320px;
    min-width: 320px;
    background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
    border-right: 1px solid var(--border-subtle);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: all var(--transition-smooth);
    position: relative;
    z-index: 50;
  }

  .sidebar.collapsed {
    width: 0;
    min-width: 0;
    opacity: 0;
    visibility: hidden;
  }

  .sidebar-header {
    padding: 1.5rem 1.25rem 1rem;
    border-bottom: 1px solid var(--border-subtle);
  }

  .sidebar-header h2 {
    font-family: var(--font-serif);
    font-size: 1.3rem;
    font-weight: 500;
    color: var(--gold-primary);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .search-wrapper {
    position: relative;
    margin-bottom: 12px;
  }

  .search-wrapper i {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .search-input {
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 10px 12px 10px 38px;
    color: var(--text-primary);
    font-size: 0.85rem;
    font-family: var(--font-sans);
    outline: none;
    transition: all var(--transition-fast);
  }

  .search-input:focus {
    border-color: var(--gold-primary);
    box-shadow: 0 0 0 3px var(--gold-soft);
  }

  .filter-group {
    display: flex;
    gap: 8px;
  }

  .filter-select {
    flex: 1;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 7px 8px;
    color: var(--text-secondary);
    font-size: 0.75rem;
    font-family: var(--font-sans);
    outline: none;
    cursor: pointer;
  }

  /* Member List */
  .member-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.75rem;
  }

  .member-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    margin-bottom: 4px;
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all var(--transition-fast);
    border: 1px solid transparent;
    background: transparent;
  }

  .member-card:hover {
    background: var(--bg-card);
    border-color: var(--border-subtle);
    transform: translateX(2px);
  }

  .member-card.active {
    background: linear-gradient(90deg, var(--gold-soft), transparent);
    border-color: var(--border-medium);
  }

  .member-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    font-weight: 600;
    flex-shrink: 0;
    position: relative;
    box-shadow: var(--shadow-sm);
  }

  .member-avatar::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    opacity: 0.3;
  }

  .member-avatar.male {
    background: linear-gradient(135deg, var(--male-color), color-mix(in srgb, var(--male-color) 70%, white));
    color: white;
  }

  .member-avatar.female {
    background: linear-gradient(135deg, var(--female-color), color-mix(in srgb, var(--female-color) 70%, white));
    color: white;
  }

  .member-avatar.unknown {
    background: linear-gradient(135deg, var(--unknown-color), color-mix(in srgb, var(--unknown-color) 70%, white));
    color: white;
  }

  .member-info {
    flex: 1;
    min-width: 0;
  }

  .member-name {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .member-meta {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .deceased-badge {
    color: var(--text-muted);
    font-size: 0.65rem;
  }

  /* Stats Bar */
  .stats-container {
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--border-subtle);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    background: linear-gradient(0deg, var(--bg-secondary) 0%, transparent 100%);
  }

  .stat-item {
    text-align: center;
  }

  .stat-value {
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--gold-primary);
    font-family: var(--font-serif);
    line-height: 1.2;
  }

  .stat-label {
    font-size: 0.6rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Tree Canvas Area */
  .canvas-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg-primary);
    background-image: 
      radial-gradient(circle at 15% 25%, rgba(212, 175, 55, 0.03) 0%, transparent 40%),
      radial-gradient(circle at 85% 75%, rgba(212, 175, 55, 0.02) 0%, transparent 50%),
      repeating-linear-gradient(45deg, var(--border-subtle) 0px, var(--border-subtle) 1px, transparent 1px, transparent 30px);
  }

  #treeCanvas {
    width: 100%;
    height: 100%;
    cursor: grab;
    transition: cursor 0.1s;
  }

  #treeCanvas.dragging {
    cursor: grabbing;
  }

  /* Floating Controls */
  .canvas-controls {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 30;
  }

  .control-btn {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-md);
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all var(--transition-fast);
    backdrop-filter: blur(10px);
    font-size: 1.1rem;
  }

  .control-btn:hover {
    background: var(--bg-card-hover);
    color: var(--gold-primary);
    border-color: var(--border-medium);
    transform: scale(1.05);
  }

  /* Empty State */
  .empty-state {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 20;
  }

  .empty-state-icon {
    font-size: 5rem;
    margin-bottom: 1.5rem;
    opacity: 0.6;
    filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.3));
  }

  .empty-state h2 {
    font-family: var(--font-serif);
    font-size: 2rem;
    font-weight: 500;
    color: var(--gold-primary);
    margin-bottom: 0.5rem;
  }

  .empty-state p {
    color: var(--text-muted);
    font-size: 0.95rem;
    line-height: 1.6;
  }

  /* Detail Panel - Refined */
  .detail-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 340px;
    max-width: calc(100vw - 40px);
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    z-index: 40;
    display: none;
    backdrop-filter: blur(20px);
    animation: slideIn 0.25s ease-out;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .detail-panel.visible { display: block; }

  .detail-header {
    padding: 1.25rem;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    border-bottom: 1px solid var(--border-subtle);
    background: linear-gradient(180deg, var(--gold-soft), transparent);
  }

  .detail-avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    font-weight: 600;
    flex-shrink: 0;
    box-shadow: var(--shadow-md);
  }

  .detail-title {
    flex: 1;
  }

  .detail-name {
    font-family: var(--font-serif);
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.3;
  }

  .detail-subtitle {
    font-size: 0.8rem;
    color: var(--gold-primary);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .detail-content {
    padding: 1.25rem;
    max-height: 350px;
    overflow-y: auto;
  }

  .detail-field {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
    font-size: 0.8rem;
  }

  .field-label {
    color: var(--text-muted);
    min-width: 90px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-size: 0.65rem;
    font-weight: 500;
  }

  .field-value {
    color: var(--text-secondary);
    text-align: right;
    max-width: 60%;
    word-break: break-word;
  }

  .detail-actions {
    padding: 0.75rem 1.25rem;
    border-top: 1px solid var(--border-subtle);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* Modal - Modern */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 9, 8, 0.9);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(8px);
    animation: fadeIn 0.2s ease-out;
  }

  .modal-overlay.hidden { display: none; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border-medium);
    border-radius: var(--radius-xl);
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-lg);
    animation: modalSlideUp 0.25s ease-out;
  }

  @keyframes modalSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    padding: 1.5rem 1.75rem;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, var(--gold-soft), transparent);
  }

  .modal-header h2 {
    font-family: var(--font-serif);
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--gold-primary);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 1.5rem;
    cursor: pointer;
    padding: 4px 8px;
    transition: color var(--transition-fast);
    line-height: 1;
  }

  .modal-close:hover { color: var(--text-primary); }

  .modal-body {
    padding: 1.75rem;
    overflow-y: auto;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }

  .form-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-field.full-width {
    grid-column: 1 / -1;
  }

  .form-field label {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .form-control {
    background: var(--bg-tertiary);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    color: var(--text-primary);
    font-size: 0.85rem;
    font-family: var(--font-sans);
    outline: none;
    transition: all var(--transition-fast);
    width: 100%;
  }

  .form-control:focus {
    border-color: var(--gold-primary);
    box-shadow: 0 0 0 3px var(--gold-soft);
  }

  .form-control option {
    background: var(--bg-tertiary);
  }

  textarea.form-control {
    resize: vertical;
    min-height: 80px;
  }

  .form-divider {
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 1.5rem 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border-subtle);
  }

  .modal-footer {
    padding: 1rem 1.75rem;
    border-top: 1px solid var(--border-subtle);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    background: var(--bg-tertiary);
  }

  /* Toast Notification */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    background: var(--bg-card);
    border: 1px solid var(--border-medium);
    border-radius: var(--radius-lg);
    padding: 14px 20px;
    font-size: 0.85rem;
    color: var(--text-primary);
    box-shadow: var(--shadow-lg);
    backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transform: translateX(100%);
    transition: all var(--transition-smooth);
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(0);
  }

  .toast i {
    color: var(--gold-primary);
    font-size: 1.1rem;
  }

  /* Tooltip */
  .node-tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--bg-card);
    border: 1px solid var(--border-medium);
    border-radius: var(--radius-md);
    padding: 10px 16px;
    font-size: 0.8rem;
    color: var(--text-primary);
    z-index: 35;
    display: none;
    box-shadow: var(--shadow-md);
    backdrop-filter: blur(10px);
    white-space: nowrap;
  }

  /* Legend */
  .legend-panel {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-lg);
    padding: 14px 18px;
    font-size: 0.7rem;
    color: var(--text-muted);
    z-index: 30;
    backdrop-filter: blur(10px);
  }

  .legend-title {
    color: var(--text-secondary);
    font-weight: 600;
    margin-bottom: 10px;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-line {
    width: 20px;
    height: 3px;
    background: var(--gold-primary);
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* Hint Bar */
  .hint-bar {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: 50px;
    padding: 8px 20px;
    font-size: 0.75rem;
    color: var(--text-muted);
    pointer-events: none;
    z-index: 25;
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    gap: 20px;
    white-space: nowrap;
  }

  .hint-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .hint-item i {
    color: var(--gold-primary);

  @media (max-width: 768px) {
    .app-header {
      padding: 0 1rem;
      height: 60px;
    }

    .logo-text {
      font-size: 1.2rem;
    }

    .logo-subtext {
      display: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      font-size: 18px;
    }

    .header-actions {
      gap: 6px;
    }

    .btn {
      padding: 6px 12px;
      font-size: 0.7rem;
    }

    .btn span {
      display: none;
    }

    .btn i {

    }

      top: 60px;
      bottom: 0;

    }

      right: 12px;
    }

    .control-btn {
      width: 36px;
      height: 36px;
      font-size: 1rem;
    }
  }

  @media (max-width: 480px) {

  /* Print Styles */
  @media print {

    }

    .tree-node rect {

      stroke: #333 !important;
    }

    .tree-node text {
      fill: #333 !important;
    }
  }
</style>
