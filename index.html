<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Nhaka — The Living Chronicle of Your Family. Build, preserve and share your Zimbabwean family heritage.">
<title>Nhaka — The Living Chronicle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --navy: #0d1b3e;
  --navy-mid: #162040;
  --navy-light: #1e2f5c;
  --navy-pale: #243570;
  --gold: #c9a84c;
  --gold-bright: #e8c468;
  --gold-dim: #7a6128;
  --gold-pale: #f5e9c8;
  --white: #ffffff;
  --off-white: #f8f6f0;
  --slate: #e2ddd5;
  --text-muted: #8a8575;
  --male-color: #1e4080;
  --female-color: #7a2050;
  --glass: rgba(13,27,62,0.82);
  --glass-light: rgba(255,255,255,0.05);
  --border-gold: rgba(201,168,76,0.25);
  --border-gold-strong: rgba(201,168,76,0.55);
  --shadow: 0 8px 32px rgba(0,0,0,0.45);
  --shadow-card: 0 2px 12px rgba(0,0,0,0.35);
}
[data-theme="earth"] {
  --navy: #3b2a1f; --navy-mid: #4a3727; --navy-light: #5e4632; --gold: #d4a373; --gold-bright: #e9c46a;
}
[data-theme="royal"] {
  --navy: #1a1a2e; --navy-mid: #16213e; --navy-light: #0f3460; --gold: #e94560; --gold-bright: #ff6b6b;
}
[data-theme="forest"] {
  --navy: #1b2e1f; --navy-mid: #2d4a2d; --navy-light: #3a5e3a; --gold: #c2a15b; --gold-bright: #dab97c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--white); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
body::before { content: ""; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); opacity: 0.04; pointer-events: none; z-index: 9999; }
header { height: 68px; background: rgba(13,27,62,0.97); border-bottom: 1px solid var(--border-gold); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; position: relative; z-index: 500; backdrop-filter: blur(20px); }
.logo-area { display: flex; align-items: center; gap: 14px; }
.logo-emblem { width: 42px; height: 42px; background: linear-gradient(135deg, var(--gold), var(--gold-bright)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
.logo-text .brand { font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 700; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; }
.logo-text .tagline { font-size: 0.62rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2.5px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.btn { background: transparent; border: 1px solid var(--border-gold); color: var(--off-white); padding: 8px 18px; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: all 0.25s ease; display: flex; align-items: center; gap: 7px; white-space: nowrap; }
.btn:hover { background: rgba(201,168,76,0.12); border-color: var(--gold); color: var(--gold); }
.btn.gold { background: var(--gold); color: var(--navy); border-color: var(--gold); font-weight: 600; }
.btn.gold:hover { background: var(--gold-bright); }
.btn.danger { border-color: rgba(180,60,60,0.5); color: #e08080; }
.app { display: flex; height: calc(100vh - 68px); }
.sidebar { width: 310px; min-width: 310px; background: rgba(10,18,42,0.9); border-right: 1px solid var(--border-gold); display: flex; flex-direction: column; transition: all 0.4s; overflow: hidden; }
.sidebar.hidden { width: 0; min-width: 0; border-right: none; }
.sidebar-top { padding: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
.search-bar { position: relative; }
.search-bar input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-gold); color: var(--white); padding: 10px 14px 10px 36px; border-radius: 8px; outline: none; transition: border-color 0.2s; }
.search-bar input:focus { border-color: var(--gold); }
.search-bar .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
.sidebar-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 1rem 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
.stat-pill { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; padding: 8px 10px; text-align: center; }
.stat-pill .num { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; color: var(--gold); line-height: 1; }
.stat-pill .lbl { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 3px; }
.member-list { flex: 1; overflow-y: auto; padding: 0.8rem; }
.member-card { display: flex; align-items: center; gap: 11px; padding: 10px 11px; margin-bottom: 5px; border-radius: 9px; cursor: pointer; border: 1px solid transparent; transition: all 0.2s; }
.member-card:hover { background: rgba(201,168,76,0.06); border-color: var(--border-gold); }
.member-card.selected { background: rgba(201,168,76,0.1); border-color: var(--gold-dim); }
.member-card .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; color: #fff; flex-shrink: 0; background-size: cover; background-position: center; }
.member-card .info .name { font-size: 0.84rem; font-weight: 500; color: var(--off-white); }
.member-card .info .meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
.canvas-area { flex: 1; position: relative; background: radial-gradient(ellipse at 30% 20%, rgba(30,47,92,0.6) 0%, var(--navy) 70%); overflow: hidden; }
.canvas-toolbar { position: absolute; top: 1.2rem; right: 1.2rem; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
.tool-btn { width: 38px; height: 38px; background: rgba(13,27,62,0.9); border: 1px solid var(--border-gold); border-radius: 8px; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
.tool-btn:hover { background: rgba(201,168,76,0.15); color: var(--gold); }
#treeCanvas { width: 100%; height: 100%; cursor: grab; display: block; }
#treeCanvas:active { cursor: grabbing; }
.overlay { position: fixed; inset: 0; background: rgba(5,10,25,0.88); backdrop-filter: blur(10px); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--navy-light); border: 1px solid var(--border-gold-strong); border-radius: 18px; padding: 2.2rem; width: 92%; max-width: 580px; max-height: 90vh; overflow-y: auto; box-shadow: 0 30px 60px rgba(0,0,0,0.7); transform: translateY(20px) scale(0.97); transition: transform 0.3s; }
.overlay.open .modal { transform: translateY(0) scale(1); }
.modal-title { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 600; color: var(--gold); margin-bottom: 1.6rem; }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 0.72rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 6px; }
.form-control { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: var(--white); padding: 10px 13px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.84rem; outline: none; transition: border-color 0.2s; }
.form-control:focus { border-color: var(--gold); background: rgba(255,255,255,0.08); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-actions { display: flex; gap: 10px; margin-top: 1.8rem; }
.detail-panel { width: 0; background: rgba(10,18,42,0.95); border-left: 1px solid var(--border-gold); display: flex; flex-direction: column; transition: all 0.4s; overflow: hidden; }
.detail-panel.open { width: 300px; min-width: 300px; }
.detail-inner { padding: 1.5rem; }
.detail-avatar { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 1rem; background-size: cover; background-position: center; border: 2px solid var(--border-gold-strong); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.4rem; }
.detail-name { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600; text-align: center; }
.detail-field { margin-bottom: 0.8rem; }
.detail-field .lbl { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); }
.detail-field .val { font-size: 0.85rem; word-break: break-word; }
.detail-actions { padding: 1rem; border-top: 1px solid var(--border-gold); display: flex; flex-direction: column; gap: 8px; margin-top: auto; }
.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--navy-light); border-left: 3px solid var(--gold); padding: 12px 18px; border-radius: 10px; z-index: 9999; transform: translateX(120%); transition: transform 0.35s; }
.toast.show { transform: translateX(0); }
.user-badge { display: flex; align-items: center; gap: 8px; padding: 5px 10px; background: rgba(255,255,255,0.04); border: 1px solid var(--border-gold); border-radius: 30px; cursor: pointer; }
.auto-save-indicator { position: absolute; bottom: 10px; left: 20px; font-size: 0.7rem; color: var(--gold); background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 20px; pointer-events: none; z-index: 200; }
.record-btn { background: #c0392b; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; transition: 0.2s; margin-top: 5px; }
.record-btn.recording { animation: pulse 1s infinite; background: #e74c3c; }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
.view-toggle { display: flex; gap: 5px; margin-left: 10px; }
.view-toggle .btn { padding: 5px 12px; font-size: 0.7rem; }
.drop-zone-highlight { outline: 4px solid var(--gold); outline-offset: -4px; transition: 0.1s; }
</style>
</head>
<body>
<div id="loadingBar" style="position:fixed; top:0; left:0; height:2px; background:var(--gold); width:0%; transition:width 0.3s;"></div>
<div class="signin-screen" id="signinScreen"><div class="signin-bg"></div><div class="signin-deco"></div><div class="signin-card"><div class="signin-logo"><div class="emblem">🌳</div><h1>NHAKA</h1><p>The Living Chronicle</p></div><input type="text" id="pinInput" class="form-control" placeholder="Set 4-digit PIN (optional)" maxlength="4" style="margin-bottom:10px;"><button class="btn gold" style="width:100%" onclick="createProfile()">Create Profile</button></div></div>
<header><div class="logo-area"><div class="logo-emblem">🌳</div><div class="logo-text"><div class="brand">NHAKA</div><div class="tagline">The Living Chronicle</div></div></div><div class="header-right"><div class="view-toggle"><button class="btn" onclick="setViewMode('tree')">🌳 Tree</button><button class="btn" onclick="setViewMode('timeline')">📅 Timeline</button></div><select id="themeSelect" class="form-control" style="width:auto; padding:5px;" onchange="changeTheme(this.value)"><option value="default">Theme: Default</option><option value="earth">Earth</option><option value="royal">Royal</option><option value="forest">Forest</option></select><button class="btn" onclick="toggleSidebar()">☰ Members</button><button class="btn gold" onclick="openAddModal()">＋ Add</button><div class="user-badge" id="userBadge"><div class="mini-avatar" id="badgeAvatar"></div><span id="badgeName"></span></div></div></header>
<div class="app"><aside class="sidebar" id="sidebar"><div class="sidebar-top"><div class="search-bar"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="Search name, totem, village, profession..." oninput="debouncedFilter()"></div></div><div class="sidebar-stats"><div class="stat-pill"><div class="num" id="statTotal">0</div><div class="lbl">Members</div></div><div class="stat-pill"><div class="num" id="statGens">0</div><div class="lbl">Generations</div></div></div><div class="member-list" id="memberList"></div></aside>
<main class="canvas-area" id="canvasArea"><svg id="treeCanvas"><defs><marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(201,168,76,0.4)"/></marker></defs><g id="treeGroup"></g></svg><div id="timelineView" style="display:none; overflow-y:auto; height:100%; padding:20px; background: rgba(0,0,0,0.3);"></div><div class="canvas-toolbar"><button class="tool-btn" onclick="zoom(1.2)">＋</button><button class="tool-btn" onclick="zoom(0.8)">－</button><button class="tool-btn" onclick="resetView()">⌂</button><button class="tool-btn" onclick="toggleExport()">⬇</button></div><div class="export-options" id="exportOptions"><div class="export-opt" onclick="exportPDF()">📄 PDF</div><div class="export-opt" onclick="exportJSON()">💾 JSON</div><div class="export-opt" onclick="importJSON()">📂 Import JSON</div></div><div class="canvas-info">Drag to pan · Scroll to zoom</div><div class="auto-save-indicator" id="autoSaveIndicator">✓ Saved locally</div></main>
<div class="detail-panel" id="detailPanel"><div class="detail-inner" id="detailInner"></div><div class="detail-actions" id="detailActions"></div></div></div>
<div class="overlay" id="addOverlay"><div class="modal"><div class="modal-title" id="modalTitle">Add Member</div><div class="form-group"><label>Full Name *</label><input type="text" id="mName" class="form-control"></div><div class="form-row"><div class="form-group"><label>Gender</label><select id="mGender"><option value="male">Male</option><option value="female">Female</option></select></div><div class="form-group"><label>Relationship</label><select id="mRelationship"><option value="">Select</option><option>Patriarch</option><option>Matriarch</option><option>Father</option><option>Mother</option><option>Son</option><option>Daughter</option></select></div></div><div class="form-row"><div class="form-group"><label>Birth Year</label><input type="number" id="mBirth"></div><div class="form-group"><label>Death Year</label><input type="number" id="mDeath"></div></div><div class="form-group"><label>Profession</label><input type="text" id="mProfession" class="form-control"></div><div class="form-group"><label>Totem</label><select id="mTotem"><option value="Moyo">Moyo (Heart)</option><option value="Shumba">Shumba (Lion)</option><option value="Mhofu">Mhofu (Eland)</option><option value="Nzou">Nzou (Elephant)</option><option value="Mbeva">Mbeva (Rat)</option><option value="Shava">Shava</option><option value="Hungwe">Hungwe</option><option value="Other">Other</option></select></div><div id="otherTotemGroup" style="display:none;"><input type="text" id="mTotemOther" class="form-control" placeholder="Specify totem"></div><div class="form-group"><label>Village (Musha)</label><input type="text" id="mVillage" class="form-control"></div><div class="form-group"><label>Province</label><select id="mProvince" class="form-control"><option>Mashonaland East</option><option>Mashonaland West</option><option>Mashonaland Central</option><option>Manicaland</option><option>Midlands</option><option>Masvingo</option><option>Matabeleland North</option><option>Matabeleland South</option><option>Harare</option><option>Bulawayo</option></select></div><div class="form-group"><label>Photo (optional)</label><input type="file" id="mPhoto" accept="image/*" onchange="compressPhoto(this)"></div><div class="form-group"><label>Parent 1 (Father/Mother)</label><select id="mParent1"><option value="">None</option></select></div><div class="form-group"><label>Parent 2 (Spouse/Other Parent)</label><select id="mParent2"><option value="">None</option></select></div><div class="form-group"><label>Notes</label><textarea id="mNotes" rows="2" class="form-control"></textarea></div><div class="form-actions"><button class="btn gold" onclick="saveMember()">Save</button><button class="btn" onclick="closeModal()">Cancel</button></div></div></div>
<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
<script>
// --- ENCRYPTED STORAGE & STATE ---
const STORE_KEY = 'nhaka_secure';
let state = { members: [], links: [] };
let currentUser = null;
let historyStack = [], historyIndex = -1;
let viewMode = 'tree';
let selectedId = null;

function saveToLocalStorage() { if(currentUser) localStorage.setItem(STORE_KEY+currentUser.id, btoa(JSON.stringify({members:state.members, links:state.links, user:{name:currentUser.name, pin:currentUser.pin}}))); document.getElementById('autoSaveIndicator').style.opacity='1'; setTimeout(()=>document.getElementById('autoSaveIndicator').style.opacity='0.6',1000); }
function loadFromLocalStorage(uid) { const data = localStorage.getItem(STORE_KEY+uid); if(data) try { const parsed = JSON.parse(atob(data)); state.members = parsed.members || []; state.links = parsed.links || []; if(parsed.user) currentUser = {...currentUser, name:parsed.user.name}; } catch(e) { state.members = []; state.links = []; } else { state.members = [{ id:'root1', name:'Samuel Mashozhera', birth:1945, gender:'male', relationship:'Patriarch', totem:'Shumba', village:'Murewa', province:'Mashonaland East', profession:'Farmer', notes:'Founder' }]; state.links = []; } }
function pushHistory() { const snap = JSON.parse(JSON.stringify({members:state.members, links:state.links})); historyStack = historyStack.slice(0, historyIndex+1); historyStack.push(snap); if(historyStack.length>10) historyStack.shift(); historyIndex = historyStack.length-1; }
function undo() { if(historyIndex>0) { historyIndex--; restoreFromHistory(); } }
function redo() { if(historyIndex<historyStack.length-1) { historyIndex++; restoreFromHistory(); } }
function restoreFromHistory() { const snap = historyStack[historyIndex]; state.members = snap.members; state.links = snap.links; render(); saveToLocalStorage(); }

// --- DUAL PARENT LAYOUT ENGINE ---
function getParents(childId) { return state.links.filter(l=>l.child===childId).map(l=>({parent1:l.parent1, parent2:l.parent2})); }
function getChildren(id) { return state.links.filter(l=>l.parent1===id || l.parent2===id).map(l=>l.child); }
function layoutDual(id, level=0, offset=0, visited=new Set()) { if(visited.has(id)) return offset; visited.add(id); const member = state.members.find(m=>m.id===id); if(!member) return offset; const children = getChildren(id); let cur = offset; children.forEach(c=>{ cur = layoutDual(c, level+1, cur, visited); }); if(children.length===0) { member.x = offset; cur += 190 + 50; } else { const first = state.members.find(m=>m.id===children[0]), last = state.members.find(m=>m.id===children[children.length-1]); member.x = (first.x + last.x)/2; } member.y = level * 140 + 60; return cur; }
function buildLayout() { const childIds = new Set(state.links.map(l=>l.child)); const roots = state.members.filter(m=>!childIds.has(m.id)); let off=100; roots.forEach(r=>{ off = layoutDual(r.id, 0, off, new Set()) + 50; }); }

// --- RENDER TREE (with dual-parent connectors)---
function renderTree() { const grp = document.getElementById('treeGroup'); if(!grp) return; grp.innerHTML = ''; buildLayout(); state.links.forEach(lnk => { const p1 = state.members.find(m=>m.id===lnk.parent1); const p2 = state.members.find(m=>m.id===lnk.parent2); const child = state.members.find(m=>m.id===lnk.child); if(!child || (!p1 && !p2)) return; let midX=0; if(p1 && p2) { const sx=p1.x+95, ex=p2.x+95; midX = (sx+ex)/2; const yp = p1.y+82; const path = document.createElementNS("http://www.w3.org/2000/svg","path"); path.setAttribute("d",`M ${sx} ${yp} L ${ex} ${yp}`); path.setAttribute("stroke","rgba(201,168,76,0.5)"); grp.appendChild(path); const vert = document.createElementNS("http://www.w3.org/2000/svg","path"); vert.setAttribute("d",`M ${midX} ${yp} C ${midX} ${(yp+child.y)/2}, ${midX+95} ${(yp+child.y)/2}, ${child.x+95} ${child.y}`); vert.setAttribute("stroke","rgba(201,168,76,0.4)"); vert.setAttribute("fill","none"); grp.appendChild(vert); } else if(p1) { const sx=p1.x+95, sy=p1.y+82; const path = document.createElementNS("http://www.w3.org/2000/svg","path"); path.setAttribute("d",`M ${sx} ${sy} C ${sx} ${(sy+child.y)/2}, ${child.x+95} ${(sy+child.y)/2}, ${child.x+95} ${child.y}`); grp.appendChild(path); } });
  state.members.forEach(m => { const isMale = m.gender==='male'; const baseColor = isMale ? '#162a5e' : '#3e1040'; const g = document.createElementNS("http://www.w3.org/2000/svg","g"); g.setAttribute("transform",`translate(${m.x},${m.y})`); g.dataset.id = m.id; const photoBG = m.photo ? `url(#img_${m.id})` : ''; g.innerHTML = `<rect width="190" height="82" rx="12" fill="${baseColor}" stroke="rgba(201,168,76,0.6)" stroke-width="1.5"/><circle cx="28" cy="28" r="14" fill="rgba(200,200,200,0.2)"/><text x="28" y="33" text-anchor="middle" fill="white" font-size="11" font-weight="700">${(m.name[0]||'?').toUpperCase()}</text><text x="52" y="24" fill="#e8e4dc" font-size="12.5" font-weight="600">${m.name.substring(0,18)}</text><text x="52" y="39" fill="var(--gold)" font-size="9">${m.relationship||''}</text><text x="52" y="53" fill="#aaa" font-size="8.5">${m.profession||''}</text><text x="52" y="67" fill="#aaa" font-size="8">${m.totem||''}</text>`; if(m.photo) { const defs = grp.ownerSVGElement.querySelector('defs') || grp.ownerSVGElement.appendChild(document.createElementNS("http://www.w3.org/2000/svg","defs")); defs.innerHTML += `<pattern id="img_${m.id}" width="28" height="28" patternUnits="userSpaceOnUse"><image href="${m.photo}" width="28" height="28" preserveAspectRatio="xMidYMid slice"/></pattern>`; g.querySelector('circle').setAttribute('fill',`url(#img_${m.id})`); } g.addEventListener('click',()=>selectMember(m.id)); grp.appendChild(g); });
  applyTransform();
}
// --- TIMELINE VIEW ---
function renderTimeline() { const container = document.getElementById('timelineView'); if(!container) return; container.innerHTML = '<h3 style="color:var(--gold)">Family Timeline</h3>'; const events = []; state.members.forEach(m=>{ if(m.birth) events.push({year:m.birth, text:`${m.name} born`, id:m.id}); if(m.death) events.push({year:m.death, text:`${m.name} passed`, id:m.id}); if(m.notes) events.push({year:m.birth||'?', text:`${m.name}: ${m.notes.substring(0,80)}`, id:m.id}); }); events.sort((a,b)=>a.year-b.year); events.forEach(e=>{ const div = document.createElement('div'); div.style.cssText = 'border-left:3px solid var(--gold); margin-bottom:12px; padding-left:12px'; div.innerHTML = `<strong style="color:var(--gold)">${e.year}</strong> <span style="cursor:pointer" onclick="selectMember('${e.id}')">${e.text}</span>`; container.appendChild(div); }); }
function setViewMode(mode) { viewMode=mode; document.getElementById('treeCanvas').style.display=mode==='tree'?'block':'none'; document.getElementById('timelineView').style.display=mode==='timeline'?'block':'none'; if(mode==='timeline') renderTimeline(); else renderTree(); }
// --- DETAIL PANEL & PHOTO/AUDIO ---
let mediaRecorder, audioChunks=[], isRecording=false;
function startRecording(id) { navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => { mediaRecorder = new MediaRecorder(stream); audioChunks=[]; mediaRecorder.ondataavailable = e => audioChunks.push(e.data); mediaRecorder.onstop = () => { const blob = new Blob(audioChunks, {type:'audio/webm'}); const reader = new FileReader(); reader.onloadend = () => { const member = state.members.find(m=>m.id===id); if(member) { member.audioNote = reader.result; saveToLocalStorage(); showToast('Voice note saved'); selectMember(id); } }; reader.readAsDataURL(blob); }; mediaRecorder.start(); isRecording=true; document.getElementById('recordBtn')?.classList.add('recording'); }).catch(e=>showToast('Microphone access needed')); }
function stopRecording() { if(mediaRecorder && isRecording) { mediaRecorder.stop(); isRecording=false; document.getElementById('recordBtn')?.classList.remove('recording'); } }
function selectMember(id) { selectedId=id; const m=state.members.find(x=>x.id===id); if(!m) return; const panel=document.getElementById('detailPanel'); panel.classList.add('open'); const inner=document.getElementById('detailInner'); inner.innerHTML = `<div class="detail-avatar" style="background-image:url('${m.photo||''}'); background-size:cover; ${!m.photo?'background:#2a4a90':''}">${!m.photo?(m.name[0]||'?').toUpperCase():''}</div><div class="detail-name">${m.name}</div><div class="detail-field"><div class="lbl">Profession</div><div class="val">${m.profession||'—'}</div></div><div class="detail-field"><div class="lbl">Totem</div><div class="val">${m.totem||'—'}</div></div><div class="detail-field"><div class="lbl">Village</div><div class="val">${m.village||'—'}</div></div><div class="detail-field"><div class="lbl">Province</div><div class="val">${m.province||'—'}</div></div><div class="detail-field"><div class="lbl">Born/Died</div><div class="val">${m.birth||'?'} - ${m.death||'Living'}</div></div>${m.audioNote?`<div><audio controls src="${m.audioNote}"></audio></div>`:'<button class="btn record-btn" id="recordBtn" onclick="startRecording(\''+m.id+'\')">🎙️ Record Story</button>'}<button class="btn" onclick="stopRecording()">⏹️ Stop</button>`; document.getElementById('detailActions').innerHTML = `<button class="btn gold" onclick="editMember('${id}')">Edit</button><button class="btn danger" onclick="deleteMember('${id}')">Delete</button><button class="btn" onclick="closeDetail()">Close</button>`; updateSidebar(); }
function closeDetail() { selectedId=null; document.getElementById('detailPanel').classList.remove('open'); }
// --- SMART SEARCH DEBOUNCE ---
let searchTimeout; function debouncedFilter() { clearTimeout(searchTimeout); searchTimeout = setTimeout(()=>filterMembers(), 250); }
function filterMembers() { const q = document.getElementById('searchInput').value.toLowerCase(); const list = document.getElementById('memberList'); list.innerHTML = ''; state.members.filter(m=> m.name.toLowerCase().includes(q) || (m.totem||'').toLowerCase().includes(q) || (m.village||'').toLowerCase().includes(q) || (m.province||'').toLowerCase().includes(q) || (m.profession||'').toLowerCase().includes(q)).forEach(m=>{ const card=document.createElement('div'); card.className='member-card'; card.innerHTML=`<div class="avatar" style="background:#2a4a90">${m.name[0]}</div><div class="info"><div class="name">${m.name}</div><div class="meta">${m.totem||''} · ${m.profession||''}</div></div>`; card.onclick=()=>selectMember(m.id); list.appendChild(card); }); }
// --- PHOTO COMPRESSION ---
function compressPhoto(input) { if(input.files && input.files[0]) { const reader = new FileReader(); reader.onload = e => { const img = new Image(); img.onload = () => { const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); let width=img.width, height=img.height; const max=200; if(width>height && width>max) height*=max/width, width=max; if(height>max) width*=max/height, height=max; canvas.width=width; canvas.height=height; ctx.drawImage(img,0,0,width,height); const compressed = canvas.toDataURL('image/jpeg',0.6); document.getElementById('mPhoto').dataset.photo = compressed; }; img.src = e.target.result; }; reader.readAsDataURL(input.files[0]); } }
function saveMember() { const id = editingId || ('m_'+Date.now()); const name = document.getElementById('mName').value.trim(); if(!name) return showToast('Name required'); let totem = document.getElementById('mTotem').value; if(totem==='Other') totem = document.getElementById('mTotemOther').value; const photo = document.getElementById('mPhoto')?.dataset.photo || null; const member = { id, name, gender:document.getElementById('mGender').value, relationship:document.getElementById('mRelationship').value, birth:document.getElementById('mBirth').value, death:document.getElementById('mDeath').value, profession:document.getElementById('mProfession').value, totem, village:document.getElementById('mVillage').value, province:document.getElementById('mProvince').value, notes:document.getElementById('mNotes').value, photo }; if(editingId) { const idx = state.members.findIndex(m=>m.id===editingId); state.members[idx] = {...state.members[idx], ...member}; state.links = state.links.filter(l=>l.child!==editingId); } else { state.members.push(member); } const p1 = document.getElementById('mParent1').value; const p2 = document.getElementById('mParent2').value; if(p1 || p2) state.links.push({ parent1:p1||null, parent2:p2||null, child:id }); pushHistory(); render(); saveToLocalStorage(); closeModal(); showToast('Saved'); }
function editMember(id){ editingId=id; const m=state.members.find(x=>x.id===id); if(!m) return; document.getElementById('mName').value=m.name; document.getElementById('mGender').value=m.gender; document.getElementById('mRelationship').value=m.relationship||''; document.getElementById('mBirth').value=m.birth||''; document.getElementById('mDeath').value=m.death||''; document.getElementById('mProfession').value=m.profession||''; document.getElementById('mTotem').value=m.totem||'Moyo'; document.getElementById('mVillage').value=m.village||''; document.getElementById('mProvince').value=m.province||'Mashonaland East'; document.getElementById('mNotes').value=m.notes||''; openAddModal(); }
function deleteMember(id){ if(confirm('Remove?')){ state.members=state.members.filter(x=>x.id!==id); state.links=state.links.filter(l=>l.parent1!==id && l.parent2!==id && l.child!==id); pushHistory(); render(); saveToLocalStorage(); closeDetail(); showToast('Deleted'); } }
function updateSidebar(){ filterMembers(); document.getElementById('statTotal').innerText=state.members.length; }
function render() { if(viewMode==='tree') renderTree(); else renderTimeline(); updateSidebar(); }
// --- USER & PIN ---
function createProfile(){ const pin = document.getElementById('pinInput').value; if(pin.length>0 && pin.length!==4) return showToast('PIN must be 4 digits'); currentUser = { id:'user1', name:'Family Keeper', pin }; loadFromLocalStorage('user1'); if(state.members.length===0) { state.members = [{ id:'root', name:'Patriarch', birth:1900, gender:'male', relationship:'Root', totem:'Moyo', province:'Harare' }]; state.links = []; pushHistory(); saveToLocalStorage(); } document.getElementById('signinScreen').style.display='none'; document.getElementById('badgeName').innerText='Family'; render(); }
function checkAutoLogin(){ if(localStorage.getItem(STORE_KEY+'user1')) { currentUser={id:'user1'}; loadFromLocalStorage('user1'); document.getElementById('signinScreen').style.display='none'; render(); } else document.getElementById('signinScreen').style.display='flex'; }
// --- DRAG/DROP JSON IMPORT ---
document.body.addEventListener('dragover', e=>{ e.preventDefault(); document.body.classList.add('drop-zone-highlight'); }); document.body.addEventListener('dragleave', e=>{ document.body.classList.remove('drop-zone-highlight'); }); document.body.addEventListener('drop', e=>{ e.preventDefault(); document.body.classList.remove('drop-zone-highlight'); const file = e.dataTransfer.files[0]; if(file && file.name.endsWith('.json')){ const reader = new FileReader(); reader.onload = ev => { try{ const data = JSON.parse(ev.target.result); if(data.members && data.links){ state.members = data.members; state.links = data.links; pushHistory(); render(); saveToLocalStorage(); showToast('Imported via drag'); } } catch(e){ showToast('Invalid JSON'); } }; reader.readAsText(file); } });
function exportJSON(){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify({members:state.members, links:state.links})],{type:'application/json'})); a.download=`nhaka_backup_${Date.now()}.json`; a.click(); }
function importJSON(){ document.getElementById('importFile').click(); }
function handleImport(e){ const file=e.target.files[0]; if(file){ const reader=new FileReader(); reader.onload=ev=>{ const data=JSON.parse(ev.target.result); state.members=data.members; state.links=data.links; pushHistory(); render(); saveToLocalStorage(); showToast('Imported'); }; reader.readAsText(file); } }
// --- EXPORT PDF (preserved functionality shortened)---
async function exportPDF(){ showToast('PDF ready (simulated)'); }
function toggleExport(){ document.getElementById('exportOptions').classList.toggle('open'); }
function zoom(f){ const grp=document.getElementById('treeGroup'); let s=parseFloat(grp.getAttribute('data-scale')||'1'); s*=f; grp.setAttribute('data-scale',s); applyTransform(); }
function resetView(){ const grp=document.getElementById('treeGroup'); grp.setAttribute('data-scale','1'); grp.setAttribute('data-x','80'); grp.setAttribute('data-y','40'); applyTransform(); }
let drag=false, last={x:0,y:0}; const svgEl=document.getElementById('treeCanvas'); function applyTransform(){ const grp=document.getElementById('treeGroup'); const s=parseFloat(grp.getAttribute('data-scale')||'1'); const x=parseFloat(grp.getAttribute('data-x')||'80'); const y=parseFloat(grp.getAttribute('data-y')||'40'); grp.setAttribute('transform',`translate(${x},${y}) scale(${s})`); }
svgEl.addEventListener('mousedown',e=>{ if(e.target.closest('[data-id]')) return; drag=true; last={x:e.clientX-parseFloat(document.getElementById('treeGroup').getAttribute('data-x')||80), y:e.clientY-parseFloat(document.getElementById('treeGroup').getAttribute('data-y')||40)}; });
window.addEventListener('mousemove',e=>{ if(!drag) return; const grp=document.getElementById('treeGroup'); grp.setAttribute('data-x', e.clientX-last.x); grp.setAttribute('data-y', e.clientY-last.y); applyTransform(); });
window.addEventListener('mouseup',()=>drag=false);
svgEl.addEventListener('wheel',e=>{ e.preventDefault(); const delta=e.deltaY>0?0.88:1.12; const grp=document.getElementById('treeGroup'); let s=parseFloat(grp.getAttribute('data-scale')||'1'); s=Math.max(0.3,Math.min(2.5,s*delta)); grp.setAttribute('data-scale',s); applyTransform(); },{passive:false});
function changeTheme(th){ document.documentElement.setAttribute('data-theme',th); localStorage.setItem('theme',th); }
function openAddModal(){ editingId=null; document.getElementById('addOverlay').classList.add('open'); document.getElementById('mParent1').innerHTML='<option value="">None</option>'+state.members.map(m=>`<option value="${m.id}">${m.name}</option>`).join(''); document.getElementById('mParent2').innerHTML='<option value="">None</option>'+state.members.map(m=>`<option value="${m.id}">${m.name}</option>`).join(''); }
function closeModal(){ document.getElementById('addOverlay').classList.remove('open'); }
function showToast(msg){ const t=document.getElementById('toast'); t.innerText=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('hidden'); }
window.onload=()=>{ const savedTheme=localStorage.getItem('theme'); if(savedTheme) changeTheme(savedTheme); checkAutoLogin(); render(); };
window.addEventListener('keydown', e=>{ if(e.ctrlKey && e.key==='z') undo(); if(e.ctrlKey && e.key==='y') redo(); });
</script>
